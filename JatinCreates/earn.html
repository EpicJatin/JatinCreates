<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Refer & Earn ₹500 | Jatin Creates</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#020617] text-slate-200 min-h-screen flex items-center justify-center">

  <div class="max-w-xl w-full bg-white/5 border border-white/10 rounded-3xl p-8">
    <h1 class="text-3xl font-bold text-white mb-2">Refer & Earn ₹500</h1>
    <p class="text-slate-400 mb-6">
      Invite someone who needs a website. If they purchase, you earn ₹500.
    </p>

    <!-- Referral Link -->
    <div class="mb-6">
      <label class="text-sm uppercase text-slate-400 font-bold">
        Your Referral Link
      </label>
      <div class="flex mt-2">
        <input
          id="refLink"
          readonly
          class="flex-1 bg-black/40 border border-white/10 px-4 py-3 rounded-l-xl text-sm"
        />
        <button
          onclick="copyLink()"
          class="bg-indigo-500 px-4 rounded-r-xl font-bold"
        >
          Copy
        </button>
      </div>
    </div>

    <!-- Stats -->
    <div class="grid grid-cols-3 gap-4 text-center mb-6">
      <div class="bg-black/40 p-4 rounded-xl">
        <div id="totalRef" class="text-xl font-bold">0</div>
        <div class="text-xs text-slate-400">Referrals</div>
      </div>
      <div class="bg-black/40 p-4 rounded-xl">
        <div id="approvedRef" class="text-xl font-bold">0</div>
        <div class="text-xs text-slate-400">Approved</div>
      </div>
      <div class="bg-black/40 p-4 rounded-xl">
        <div id="earnings" class="text-xl font-bold">₹0</div>
        <div class="text-xs text-slate-400">Earnings</div>
      </div>
    </div>

    <!-- Rules -->
    <div class="text-sm text-slate-400 space-y-2">
      <p>• Reward is credited only after payment is verified.</p>
      <p>• No self-referrals.</p>
      <p>• Approval is manual.</p>
    </div>
  </div>

<script>
function copyLink() {
  navigator.clipboard.writeText(
    document.getElementById("refLink").value
  );
  alert("Referral link copied!");
}
</script>

</body>
</html>
